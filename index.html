<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 研究情报监控站</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1e293b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #a855f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 0;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 0.75rem; }
  .logo-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }
  .logo-text h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo-text p { font-size: 0.75rem; color: var(--text2); margin-top: 1px; }
  .header-nav { display: flex; gap: 0.5rem; }
  .header-nav button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); padding: 0.4rem 1rem; border-radius: 8px;
    cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .header-nav button:hover, .header-nav button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .stat-card:nth-child(1)::before { background: var(--accent); }
  .stat-card:nth-child(2)::before { background: var(--green); }
  .stat-card:nth-child(3)::before { background: var(--purple); }
  .stat-card:nth-child(4)::before { background: var(--orange); }
  .stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 2rem; font-weight: 800; margin: 0.25rem 0; letter-spacing: -0.03em; }
  .stat-card:nth-child(1) .stat-value { color: var(--accent2); }
  .stat-card:nth-child(2) .stat-value { color: var(--green); }
  .stat-card:nth-child(3) .stat-value { color: var(--purple); }
  .stat-card:nth-child(4) .stat-value { color: var(--orange); }
  .stat-sub { font-size: 0.75rem; color: var(--text2); }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .section-head h2 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
  .section-head h2 span { font-size: 1.2rem; }

  /* ── Company Filter ── */
  .filter-bar {
    display: flex; gap: 0.4rem; flex-wrap: wrap;
    margin-bottom: 1.5rem; padding: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px;
  }
  .filter-bar .filter-label {
    font-size: 0.75rem; color: var(--text2); font-weight: 600;
    display: flex; align-items: center; margin-right: 0.5rem;
    letter-spacing: 0.03em;
  }
  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 0.35rem 0.75rem; border-radius: 8px;
    cursor: pointer; font-size: 0.75rem; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 2px 10px rgba(59,130,246,0.25);
  }
  .filter-btn .filter-icon { font-size: 0.9rem; }
  .filter-btn .filter-count {
    background: rgba(255,255,255,0.15); padding: 0.05rem 0.35rem;
    border-radius: 4px; font-size: 0.65rem; margin-left: 0.15rem;
  }
  .filter-btn.active .filter-count { background: rgba(255,255,255,0.25); }

  /* ── Platform Status ── */
  .platform-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75rem;
    margin-bottom: 2.5rem;
  }
  .platform-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem; text-align: center;
    transition: all 0.2s; cursor: pointer;
  }
  .platform-card:hover, .platform-card.selected {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(59,130,246,0.12);
  }
  .platform-card.selected { background: var(--surface2); }
  .platform-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .platform-name { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem; }
  .platform-status { font-size: 0.65rem; }
  .platform-status.online { color: var(--green); }
  .platform-status.offline { color: var(--red); }
  .platform-status.updated { color: var(--accent2); }

  /* ── Paper Cards ── */
  .paper-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
  .paper-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem 1.5rem;
    cursor: pointer; transition: all 0.25s;
  }
  .paper-card:hover {
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.08);
  }
  .paper-card.hidden { display: none; }
  .paper-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
  .paper-title { font-size: 1rem; font-weight: 700; flex: 1; }
  .paper-company-tag {
    font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 6px;
    font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }
  .paper-meta { font-size: 0.75rem; color: var(--text2); margin-bottom: 0.5rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  .paper-summary { font-size: 0.82rem; color: var(--text); margin-bottom: 0.6rem; line-height: 1.6; }
  .paper-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .paper-tag {
    font-size: 0.6rem; padding: 0.15rem 0.45rem; border-radius: 5px;
    font-weight: 600;
  }
  .tag-collab { background: rgba(34,197,94,0.15); color: #4ade80; }
  .tag-fire { background: rgba(239,68,68,0.15); color: #f87171; }
  .tag-arxiv { background: rgba(59,130,246,0.15); color: var(--accent2); }
  .tag-venue { background: rgba(168,85,247,0.15); color: #c084fc; }

  /* Company colors */
  .company-huawei { background: rgba(239,68,68,0.15); color: #f87171; }
  .company-bytedance { background: rgba(59,130,246,0.15); color: var(--accent2); }
  .company-alibaba { background: rgba(249,115,22,0.15); color: #fb923c; }
  .company-deepseek { background: rgba(34,197,94,0.15); color: #4ade80; }
  .company-moonshot { background: rgba(168,85,247,0.15); color: #c084fc; }
  .company-openai { background: rgba(16,185,129,0.15); color: #34d399; }
  .company-deepmind { background: rgba(59,130,246,0.15); color: var(--accent2); }
  .company-anthropic { background: rgba(244,114,182,0.15); color: #f472b6; }
  .company-meta { background: rgba(96,165,250,0.15); color: #93c5fd; }
  .company-nvidia { background: rgba(74,222,128,0.15); color: #4ade80; }

  .no-results {
    text-align: center; padding: 2.5rem; color: var(--text2);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; font-size: 0.9rem;
  }

  /* ── Report List ── */
  .report-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
  .report-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem 1.5rem;
    cursor: pointer; transition: all 0.25s; display: flex; align-items: center;
    gap: 1.25rem;
  }
  .report-card:hover {
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.08);
  }
  .report-date {
    min-width: 80px; text-align: center;
    background: var(--surface2); border-radius: 10px; padding: 0.6rem 0.75rem;
  }
  .report-date .day { font-size: 1.5rem; font-weight: 800; color: var(--accent2); line-height: 1; }
  .report-date .month { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; margin-top: 2px; }
  .report-info { flex: 1; }
  .report-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
  .report-info p { font-size: 0.8rem; color: var(--text2); }
  .report-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 6px;
    font-weight: 600; letter-spacing: 0.02em;
  }
  .badge-paper { background: rgba(59,130,246,0.15); color: var(--accent2); }
  .badge-talent { background: rgba(168,85,247,0.15); color: #c084fc; }
  .badge-collab { background: rgba(34,197,94,0.15); color: #4ade80; }
  .badge-infra { background: rgba(249,115,22,0.15); color: #fb923c; }
  .report-arrow { color: var(--text2); font-size: 1.2rem; transition: transform 0.2s; }
  .report-card:hover .report-arrow { transform: translateX(4px); color: var(--accent2); }

  /* ── Talent Table ── */
  .talent-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 2.5rem;
  }
  .talent-table thead th {
    background: var(--surface2); padding: 0.75rem 1rem;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text2); text-align: left; font-weight: 600;
  }
  .talent-table tbody td {
    padding: 0.75rem 1rem; font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .talent-table tbody tr:hover { background: var(--surface2); }
  .talent-table tbody tr.hidden { display: none; }
  .urgency { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .urgency.high { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
  .urgency.medium { background: var(--orange); box-shadow: 0 0 8px rgba(249,115,22,0.4); }
  .urgency.low { background: var(--yellow); }
  .talent-link { color: var(--accent2); text-decoration: none; }
  .talent-link:hover { text-decoration: underline; }

  /* ── Report Detail View ── */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .dashboard-view.hidden { display: none; }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.5rem 1rem; border-radius: 8px;
    cursor: pointer; font-size: 0.8rem; margin-bottom: 1.5rem;
    display: inline-flex; align-items: center; gap: 0.4rem;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .detail-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 2.5rem; line-height: 1.8;
  }
  .detail-content h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
  .detail-content h2 { font-size: 1.3rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: var(--accent2); }
  .detail-content h3 { font-size: 1.1rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; }
  .detail-content h4 { font-size: 0.95rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: var(--purple); }
  .detail-content p { margin-bottom: 0.75rem; color: var(--text); }
  .detail-content ul, .detail-content ol { margin: 0.5rem 0 0.75rem 1.5rem; }
  .detail-content li { margin-bottom: 0.35rem; }
  .detail-content strong { color: #f1f5f9; }
  .detail-content a { color: var(--accent2); text-decoration: none; }
  .detail-content a:hover { text-decoration: underline; }
  .detail-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  .detail-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
  .detail-content table th { background: var(--surface2); padding: 0.6rem 0.75rem; text-align: left; font-weight: 600; font-size: 0.75rem; border: 1px solid var(--border); }
  .detail-content table td { padding: 0.6rem 0.75rem; border: 1px solid var(--border); }
  .detail-content code { background: var(--surface2); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; color: var(--accent2); }
  .detail-content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: var(--text2); font-style: italic; }
  .detail-content input[type="checkbox"] { margin-right: 0.4rem; accent-color: var(--accent); }

  .radar-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem;
    margin-bottom: 2.5rem;
  }
  .radar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.15rem; cursor: pointer; transition: all 0.2s;
  }
  .radar-card:hover, .radar-card.selected {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(59,130,246,0.12);
  }
  .radar-card h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; }
  .radar-card .direction { font-size: 0.72rem; color: var(--accent2); margin-bottom: 0.15rem; }
  .radar-card .trend { font-size: 0.68rem; color: var(--text2); }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .platform-grid { grid-template-columns: repeat(3, 1fr); }
    .radar-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
    .platform-grid { grid-template-columns: repeat(2, 1fr); }
    .radar-grid { grid-template-columns: 1fr; }
    .header-nav { display: none; }
    .detail-content { padding: 1.25rem; }
    .filter-bar { padding: 0.75rem; }
  }
  /* ── Social Feed ── */
  .feed-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
  .feed-tab {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); padding: 0.4rem 0.9rem; border-radius: 8px;
    cursor: pointer; font-size: 0.78rem; transition: all 0.2s;
    display: flex; align-items: center; gap: 0.35rem;
  }
  .feed-tab:hover, .feed-tab.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .feed-tab .tab-count { font-size: 0.65rem; opacity: 0.7; }
  .feed-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 2.5rem; }
  .tweet-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.15rem; transition: all 0.2s;
  }
  .tweet-card:hover { border-color: var(--accent); }
  .tweet-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
  .tweet-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .tweet-author .tweet-name { font-size: 0.82rem; font-weight: 600; }
  .tweet-author .tweet-handle { font-size: 0.7rem; color: var(--text2); }
  .tweet-text { font-size: 0.8rem; line-height: 1.6; margin-bottom: 0.6rem; color: var(--text); display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .tweet-stats { display: flex; gap: 1rem; font-size: 0.68rem; color: var(--text2); }
  .tweet-stats span { display: flex; align-items: center; gap: 0.2rem; }
  .tweet-link { color: var(--accent2); text-decoration: none; font-size: 0.7rem; margin-left: auto; }
  .tweet-link:hover { text-decoration: underline; }
  .podcast-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.15rem; grid-column: span 2;
  }
  .podcast-card:hover { border-color: var(--accent); }
  .podcast-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
  .podcast-meta { font-size: 0.72rem; color: var(--text2); margin-bottom: 0.5rem; }
  .podcast-summary { font-size: 0.8rem; line-height: 1.6; color: var(--text); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

  /* ── arXiv Section ── */
  .arxiv-company-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .arxiv-company-tab {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); padding: 0.35rem 0.7rem; border-radius: 8px;
    cursor: pointer; font-size: 0.72rem; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 0.25rem;
  }
  .arxiv-company-tab:hover, .arxiv-company-tab.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .arxiv-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2.5rem; }
  .arxiv-paper {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.9rem 1.1rem; transition: all 0.2s;
  }
  .arxiv-paper:hover { border-color: var(--accent); }
  .arxiv-paper-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
  .arxiv-paper-title { font-size: 0.85rem; font-weight: 600; flex: 1; line-height: 1.4; }
  .arxiv-paper-title a { color: var(--text); text-decoration: none; }
  .arxiv-paper-title a:hover { color: var(--accent2); }
  .arxiv-paper-date { font-size: 0.65rem; color: var(--text2); white-space: nowrap; }
  .arxiv-paper-authors { font-size: 0.7rem; color: var(--text2); margin-top: 0.25rem; }
  .arxiv-paper-summary { font-size: 0.75rem; color: var(--text2); margin-top: 0.35rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .arxiv-paper-tags { display: flex; gap: 0.3rem; margin-top: 0.35rem; flex-wrap: wrap; }
  .arxiv-tag { font-size: 0.58rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: rgba(59,130,246,0.1); color: var(--accent2); }
  .arxiv-venue-tag { background: rgba(168,85,247,0.15); color: #c084fc; }
  @media (max-width: 600px) { .feed-grid { grid-template-columns: 1fr; } .podcast-card { grid-column: span 1; } }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .paper-card, .stat-card, .platform-card, .radar-card, .report-card { animation: fadeIn 0.4s ease both; }
  .loading { text-align: center; padding: 3rem; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🔭</div>
      <div class="logo-text">
        <h1>AI Research Radar</h1>
        <p>AI 研究情报监控站 · 每日更新</p>
      </div>
    </div>
    <div class="header-nav">
      <button class="active" onclick="showDashboard()">总览</button>
      <button onclick="showFeed()">社媒动态</button>
      <button onclick="showTalent()">人才追踪</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="dashboard-view" id="dashboardView">
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Platform Status - clickable -->
    <div class="section-head">
      <h2><span>📡</span> 监控平台状态 <span style="font-size:0.7rem;color:var(--text2);font-weight:400;margin-left:0.5rem">点击公司查看相关情报 ↓</span></h2>
    </div>
    <div class="platform-grid" id="platformGrid"></div>

    <!-- Social Feed -->

function detectCompany(text) {

// ── Parse papers from markdown
function extractPapers(md) {
  const papers = [];
  const sections = md.split(/^### 论文\d+/gm);
  const titleMatches = [...md.matchAll(/^### (论文\d+.+)$/gm)];

  for (let i = 0; i < titleMatches.length; i++) {
    const title = titleMatches[i][1].replace(/^论文\d+:\s*/, '');
    const body = sections[i + 1] || '';

    const sourceMatch = body.match(/\*\*来源\*\*:\s*(.+)/);
    const dateMatch = body.match(/\*\*发布日期\*\*:\s*(.+)/);
    const arxivMatch = body.match(/\*\*arXiv\*\*:\s*(https:\/\/[^\s]+)/);
    const contentMatch = body.match(/\*\*核心内容\*\*:\s*(.+)/);
    const hasCollab = /高校合作\*\*:\s*✅/.test(body);
    const venueMatch = body.match(/(AAAI|ICLR|ICML|NeurIPS|CVPR|ICCV|ECCV)\s*\d{4}/);

    const source = sourceMatch ? sourceMatch[1].trim() : '';
    const companyId = detectCompany(source + ' ' + title + ' ' + body.substring(0, 300));

    // Extract key highlights
    const highlights = [];
    const fireMatches = body.match(/🔥\s*(.+)/g);
    if (fireMatches) highlights.push(...fireMatches.map(m => m.replace('🔥','').trim()));

    papers.push({
      title,
      source,
      date: dateMatch ? dateMatch[1].trim() : '',
      arxiv: arxivMatch ? arxivMatch[1] : '',
      summary: contentMatch ? contentMatch[1].trim().substring(0, 200) + '…' : '',
      companyId,
      hasCollab,
      venue: venueMatch ? venueMatch[0] : '',
      highlights,
      rawSection: body
    });
  }
  return papers;
}

// ══════════════════════════════════════
// Markdown Parser
// ══════════════════════════════════════
function parseMd(md) {
  let html = md;
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/(^|[^"(])((https?:\/\/[^\s<)"]+))/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  html = html.replace(/^- \[ \] (.+)$/gm, '<li><input type="checkbox" disabled> $1</li>');
  html = html.replace(/^- \[x\] (.+)$/gm, '<li><input type="checkbox" checked disabled> $1</li>');
  html = html.replace(/(?:^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+))/gm, (match, header, sep, body) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  html = html.replace(/^(\s*)- (.+)$/gm, '<li>$2</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  const lines = html.split('\n');
  const result = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t) { result.push(''); continue; }
    if (t.match(/^<(h[1-4]|hr|ul|ol|li|table|thead|tbody|tr|th|td|blockquote|div|pre)/)) { result.push(line); continue; }
    if (t.match(/<\/(ul|ol|table|tbody|blockquote|div|pre)>/)) { result.push(line); continue; }
    if (!t.startsWith('<')) { result.push(`<p>${t}</p>`); } else { result.push(line); }
  }
  return result.join('\n');
}

          <span>💬 ${t.replies}</span>
          <a class="tweet-link" href="${t.url}" target="_blank">查看原文 →</a>
        </div>
      </div>
    `).join('');
  } else if (currentFeedTab === 'podcasts') {
    if (!feedData.podcasts.length) { grid.innerHTML = '<div class="no-results" style="grid-column:span 2">暂无播客数据</div>'; return; }
    grid.innerHTML = feedData.podcasts.map(p => {
      const summary = p.transcript ? p.transcript.substring(0, 500).replace(/Speaker \d+/g, '🎤').replace(/\|\s*[\d:]+\s*-\s*[\d:]+/g, '') + '…' : '暂无摘要';
      return `
      <div class="podcast-card">
        <div class="podcast-title">🎙️ ${p.title}</div>
        <div class="podcast-meta">📻 ${p.name} · 📅 ${new Date(p.publishedAt).toLocaleDateString('zh-CN')}</div>
        <div class="podcast-summary">${summary}</div>
        <a class="tweet-link" href="${p.url}" target="_blank" style="display:inline-block;margin-top:0.5rem">收听 →</a>
      </div>`;
    }).join('');
  } else {
    if (!feedData.blogs.length) { grid.innerHTML = '<div class="no-results" style="grid-column:span 2">暂无博客数据（最近72小时无更新）</div>'; return; }
    grid.innerHTML = feedData.blogs.map(b => `
      <div class="podcast-card">
        <div class="podcast-title">📝 ${b.title || '无标题'}</div>
        <div class="podcast-meta">${b.source || ''} · ${b.publishedAt ? new Date(b.publishedAt).toLocaleDateString('zh-CN') : ''}</div>
        <div class="podcast-summary">${b.content ? b.content.substring(0, 300) + '…' : '暂无内容'}</div>
      </div>
    `).join('');
  }
}

function switchFeedTab(tab) {
  currentFeedTab = tab;
  renderFeedTabs();
  renderFeedGrid();
}

async function loadFeeds() {
  try {
    // Load tweets
    const xResp = await fetch(FEED_URLS.x);
    if (xResp.ok) {
      const xData = await xResp.json();
      feedData.tweets = [];
      (xData.x || []).forEach(user => {
        (user.tweets || []).forEach(tweet => {
          if (tweet.text && tweet.text.length > 20) {
            feedData.tweets.push({
              name: user.name, handle: user.handle, bio: user.bio,
              ...tweet
            });
          }
        });
      });
    }
  } catch(e) { console.warn('Failed to load X feed', e); }

  try {
    const podResp = await fetch(FEED_URLS.podcasts);
    if (podResp.ok) {
      const podData = await podResp.json();
      feedData.podcasts = podData.podcasts || [];
    }
  } catch(e) { console.warn('Failed to load podcast feed', e); }

  try {
    const blogResp = await fetch(FEED_URLS.blogs);
    if (blogResp.ok) {
      const blogData = await blogResp.json();
      feedData.blogs = blogData.blogs || [];
    }
  } catch(e) { console.warn('Failed to load blog feed', e); }

  renderFeedTabs();
  renderFeedGrid();
}

// ══════════════════════════════════════
// arXiv Daily Papers
// ══════════════════════════════════════
let arxivData = null;
let currentArxivCompany = 'all';

async function loadArxiv() {
  try {
    const resp = await fetch('reports/arxiv-daily.json');
    if (resp.ok) {
      arxivData = await resp.json();
      document.getElementById('arxivMeta').textContent = arxivData.totalPapers + ' 篇 · 自 ' + arxivData.since + ' 起';
      renderArxivTabs();
      renderArxivList();
    } else {
      document.getElementById('arxivList').innerHTML = '<div class="no-results">暂无 arXiv 数据</div>';
    }
  } catch(e) {
    document.getElementById('arxivList').innerHTML = '<div class="no-results">加载失败</div>';
  }
}

function renderArxivTabs() {
  if (!arxivData) return;
  const tabs = document.getElementById('arxivTabs');
  const companies = Object.entries(arxivData.companies);
  tabs.innerHTML = '<div class="arxiv-company-tab ' + (currentArxivCompany==='all'?'active':'') + '" onclick="filterArxiv(\'all\')">全部 (' + arxivData.totalPapers + ')</div>' +
    companies.map(function(e) { var id=e[0],c=e[1]; return '<div class="arxiv-company-tab ' + (currentArxivCompany===id?'active':'') + '" onclick="filterArxiv(\'' + id + '\')">' + c.icon + ' ' + c.company + ' (' + c.count + ')</div>'; }).join('');
}

function renderArxivList() {
  if (!arxivData) return;
  var list = document.getElementById('arxivList');
  var papers = [];
  if (currentArxivCompany === 'all') {
    Object.entries(arxivData.companies).forEach(function(e) {
      var id=e[0],c=e[1];
      c.papers.forEach(function(p) { papers.push(Object.assign({}, p, {_company: c.company, _icon: c.icon})); });
    });
    papers.sort(function(a,b) { return b.published.localeCompare(a.published); });
  } else {
    var c = arxivData.companies[currentArxivCompany];
    if (c) papers = c.papers.map(function(p) { return Object.assign({}, p, {_company: c.company, _icon: c.icon}); });
  }
  if (!papers.length) { list.innerHTML = '<div class="no-results">该公司暂无论文</div>'; return; }
  list.innerHTML = papers.slice(0, 50).map(function(p) {
    var date = p.published ? new Date(p.published).toLocaleDateString('zh-CN') : '';
    var authors = p.authors.join(', ') + (p.authorCount > 8 ? ' 等' + p.authorCount + '人' : '');
    var venue = p.comment ? (p.comment.match(/(AAAI|ICLR|ICML|NeurIPS|CVPR|ICCV|ECCV|ACL|EMNLP)\s*\d{4}/i) || [null])[0] : null;
    var cats = p.categories.map(function(c) { return '<span class="arxiv-tag">' + c + '</span>'; }).join('');
    return '<div class="arxiv-paper"><div class="arxiv-paper-head"><div class="arxiv-paper-title"><a href="' + p.arxivUrl + '" target="_blank">' + p.title + '</a></div><div class="arxiv-paper-date">' + p._icon + ' ' + date + '</div></div><div class="arxiv-paper-authors">' + authors + '</div><div class="arxiv-paper-summary">' + p.summary + '</div><div class="arxiv-paper-tags"><span class="arxiv-tag">' + p._company + '</span>' + cats + (venue ? '<span class="arxiv-tag arxiv-venue-tag">🏆 ' + venue + '</span>' : '') + (p.pdfUrl ? '<a class="arxiv-tag" href="' + p.pdfUrl + '" target="_blank" style="text-decoration:none">📎 PDF</a>' : '') + '</div></div>';
  }).join('');
}

function filterArxiv(companyId) {
  currentArxivCompany = companyId;
  renderArxivTabs();
  renderArxivList();
}

// ══════════════════════════════════════
// Load Reports
// ══════════════════════════════════════
async function loadReports() {
  try {
    const indexResp = await fetch('reports/index.json');
    if (indexResp.ok) REPORT_FILES = await indexResp.json();
  } catch(e) { REPORT_FILES = ['reports/2026-04-07-report.md']; }

  for (const file of REPORT_FILES) {
    try {
      const resp = await fetch(file);
      if (!resp.ok) continue;
      const md = await resp.text();
      const dateMatch = file.match(/(\d{4})-(\d{2})-(\d{2})/);
      const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      const papers = extractPapers(md);
      ALL_PAPERS.push(...papers);

      const titleMatch = md.match(/^# (.+)$/m);
      REPORTS_DATA.push({
        file, raw: md,
        year: dateMatch ? dateMatch[1] : '2026',
        month: dateMatch ? months[parseInt(dateMatch[2])] : 'Apr',
        day: dateMatch ? dateMatch[3] : '07',
        title: titleMatch ? titleMatch[1] : file,
        papers: papers.length,
        talents: (md.match(/学生深度追踪/g) || []).length,
        collabs: (md.match(/合作高校/g) || []).length,
        summary: `覆盖10个AI研究平台 · ${papers.length}篇论文深度分析`
      });
    } catch(e) { console.warn('Failed to load', file, e); }
  }

  renderStats();
  renderPlatforms();
  renderFilterBar();
  renderPapers();
  renderReports();
  renderRadar();
  renderTalent();
}

loadReports();
loadFeeds();
loadArxiv();
</script>
